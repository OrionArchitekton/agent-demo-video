<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>agent-demo-video smoke fixture</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #0d1117; color: #e6edf3; }
  header { padding: 48px 64px 24px; }
  h1 { font-size: 40px; margin: 0 0 8px; }
  p.sub { color: #8b949e; font-size: 18px; margin: 0; }
  main { padding: 24px 64px 480px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; max-width: 560px; margin-bottom: 24px; }
  button { background: #238636; color: #fff; border: 0; border-radius: 8px; padding: 12px 22px; font-size: 17px; cursor: pointer; }
  input { background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 12px; font-size: 16px; width: 320px; }
  #result { display: none; color: #3fb950; font-size: 18px; margin-top: 14px; }
  #details { margin-top: 640px; }
</style>
</head>
<body>
<header>
  <h1>Smoke Fixture</h1>
  <p class="sub">A tiny page the pipeline can film hermetically.</p>
</header>
<main>
  <div class="card">
    <input id="name" placeholder="Your name" />
    <div style="height:14px"></div>
    <button id="go" onclick="document.getElementById('result').style.display='block'">Run the thing</button>
    <div id="result">It ran. Everything is fine.</div>
  </div>
  <div class="card" id="details">
    <h2>Details, far below the fold</h2>
    <p>The scroll action should glide here smoothly.</p>
  </div>
</main>
</body>
</html>
